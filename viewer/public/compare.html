<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>WebGL vs WebGPU splat parity harness</title>
<style>
  body { margin: 0; background: #000; color: #ddd; font: 12px ui-monospace, monospace; }
  #bar { padding: 8px 12px; display: flex; gap: 14px; align-items: center; background: #111; }
  #bar b { color: #4da3ff; }
  .row { display: flex; }
  .cell { flex: 1; position: relative; border-right: 1px solid #222; }
  .cell h3 { position: absolute; top: 4px; left: 8px; z-index: 2; margin: 0; font-size: 11px;
             background: #000a; padding: 2px 8px; border-radius: 4px; }
  iframe { width: 100%; height: 46vh; border: 0; display: block; background: #000; }
  canvas#diff { width: 100%; height: 38vh; object-fit: contain; background: #000; display: block; }
  button { background: #4da3ff; border: 0; border-radius: 4px; padding: 4px 12px; font: inherit;
           font-weight: 700; cursor: pointer; }
</style>
</head>
<body>
<div id="bar">
  <button id="capture">⟳ capture &amp; diff</button>
  <span id="stats">–</span>
  <span>diff heatmap below (red = |Δ| amplified 4×)</span>
</div>
<div class="row">
  <div class="cell"><h3>WebGL reference</h3><iframe id="a"></iframe></div>
  <div class="cell"><h3>WebGPU port</h3><iframe id="b"></iframe></div>
</div>
<canvas id="diff"></canvas>
<script>
const params = new URLSearchParams(location.search);
const url = params.get('url') ?? 'http://localhost:8901/flame_f20_new.splat';
const hash = location.hash ?? '';
const q = '?url=' + encodeURIComponent(url);
document.getElementById('a').src = '/webgl/index.html' + q + hash;
document.getElementById('b').src = '/webgpu/index.html' + q + hash;

async function captureDiff() {
  const stats = document.getElementById('stats');
  const grab = (iframe) => {
    const doc = iframe.contentDocument;
    const cv = doc && doc.getElementById('canvas');
    if (!cv) return null;
    // capture inside the iframe's own rAF so the WebGPU canvas is fresh
    return new Promise((resolve) => {
      iframe.contentWindow.requestAnimationFrame(() => {
        iframe.contentWindow.requestAnimationFrame(() => {
          const c2 = document.createElement('canvas');
          c2.width = cv.width; c2.height = cv.height;
          c2.getContext('2d').drawImage(cv, 0, 0);
          resolve(c2);
        });
      });
    });
  };
  const [ca, cb] = await Promise.all([grab(document.getElementById('a')), grab(document.getElementById('b'))]);
  if (!ca || !cb) { stats.textContent = 'canvas not ready'; return; }
  const W = Math.min(ca.width, cb.width), H = Math.min(ca.height, cb.height);
  const da = ca.getContext('2d').getImageData(0, 0, W, H).data;
  const db = cb.getContext('2d').getImageData(0, 0, W, H).data;
  const out = document.getElementById('diff');
  out.width = W; out.height = H;
  const ctx = out.getContext('2d');
  const img = ctx.createImageData(W, H);
  let sum = 0, count = 0, big = 0, max = 0;
  for (let i = 0; i < W * H; i++) {
    const dr = Math.abs(da[i*4] - db[i*4]);
    const dg = Math.abs(da[i*4+1] - db[i*4+1]);
    const dbl = Math.abs(da[i*4+2] - db[i*4+2]);
    const d = Math.max(dr, dg, dbl);
    sum += d; count++;
    if (d > 16) big++;
    if (d > max) max = d;
    img.data[i*4] = Math.min(255, d * 4);
    img.data[i*4+1] = Math.min(255, Math.max(0, d * 4 - 255));
    img.data[i*4+2] = 0;
    img.data[i*4+3] = 255;
  }
  ctx.putImageData(img, 0, 0);
  stats.innerHTML = `mean |Δ| = <b>${(sum/count).toFixed(2)}</b> · max = <b>${max}</b> · pixels &gt;16 = <b>${(100*big/count).toFixed(2)}%</b> · ${W}×${H}`;
  return { mean: sum/count, max, bigPct: 100*big/count };
}
document.getElementById('capture').onclick = captureDiff;
window.captureDiff = captureDiff;
</script>
</body>
</html>
